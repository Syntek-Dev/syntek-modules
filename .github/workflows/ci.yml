name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging, testing]
  pull_request:
    branches: [main, develop, staging, testing]

jobs:
  setup:
    runs-on: ubuntu-latest
    name: Setup & Install
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=${{ runner.os }}-syntek-cli-${{ hashFiles('rust/project-cli/src/**', 'rust/project-cli/Cargo.toml') }}" >> $GITHUB_OUTPUT

      # Set up all environments
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"

      # Build syntek CLI
      - name: Cache syntek CLI
        uses: actions/cache@v4
        id: syntek-cli-cache
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ steps.cache-key.outputs.key }}

      - name: Build syntek CLI
        if: steps.syntek-cli-cache.outputs.cache-hit != 'true'
        run: cargo build --release
        working-directory: rust/project-cli

  lint:
    runs-on: ubuntu-latest
    name: Lint All Code
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"

      - name: Install dependencies
        run: |
          uv sync
          pnpm install --no-frozen-lockfile

      - name: Cache syntek CLI
        uses: actions/cache@v4
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      - name: Run linting
        run: syntek lint

      - name: Check formatting
        run: syntek format --check

  test:
    runs-on: ubuntu-latest
    name: Test All Code
    needs: setup

    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
          POSTGRES_DB: syntek_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"

      - name: Install dependencies
        run: |
          uv sync
          pnpm install --no-frozen-lockfile

      - name: Cache syntek CLI
        uses: actions/cache@v4
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      - name: Run tests
        run: syntek test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/syntek_test # pragma: allowlist secret
          REDIS_URL: redis://localhost:6379/0

  build:
    runs-on: ubuntu-latest
    name: Build All Projects
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"

      - name: Install dependencies
        run: |
          uv sync
          pnpm install --no-frozen-lockfile

      - name: Cache syntek CLI
        uses: actions/cache@v4
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      - name: Build projects
        run: syntek build --mode production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            web/packages/*/dist
            mobile/packages/*/dist
            shared/dist
            rust/target/release/syntek

  security:
    runs-on: ubuntu-latest
    name: Security Audit
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"

      - name: Install dependencies
        run: |
          uv sync
          pnpm install --no-frozen-lockfile

      - name: Cache syntek CLI
        uses: actions/cache@v4
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      - name: Run security audit
        run: syntek audit --format json --severity moderate --output security-audit.json
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: security-audit.json
        if: always()

  summary:
    runs-on: ubuntu-latest
    name: CI/CD Summary
    needs: [lint, test, build, security]
    if: always()

    steps:
      - name: Post summary
        run: |
          echo "# CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Setup: completed" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
