name: Lint (Unified)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-all:
    runs-on: ubuntu-latest
    name: Unified Linting (All Ecosystems)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up all environments
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"
          cache: "pnpm"

      # Install dependencies
      - name: Install Python dependencies
        run: uv sync

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      # Build and install syntek CLI
      - name: Cache syntek CLI
        uses: actions/cache@v4
        id: syntek-cli-cache
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ runner.os }}-syntek-cli-${{ hashFiles('rust/project-cli/src/**', 'rust/project-cli/Cargo.toml') }}

      - name: Build syntek CLI
        if: steps.syntek-cli-cache.outputs.cache-hit != 'true'
        run: cargo build --release
        working-directory: rust/project-cli

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      # Run unified linting
      - name: Lint all code with syntek CLI
        run: syntek lint
        continue-on-error: true

      - name: Check formatting
        run: syntek format --check
        continue-on-error: true

      - name: Additional type checking
        run: |
          # Python type checking
          uv run mypy backend/ graphql/
          # TypeScript type checking
          pnpm typecheck
        continue-on-error: true
