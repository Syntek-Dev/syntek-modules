name: Lint Python

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**/*.py"
      - "graphql/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/lint-python.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**/*.py"
      - "graphql/**/*.py"
      - "pyproject.toml"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Python Linting & Formatting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up environments for CLI
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv sync

      # Build syntek CLI
      - name: Cache syntek CLI
        uses: actions/cache@v4
        id: syntek-cli-cache
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ runner.os }}-syntek-cli-${{ hashFiles('rust/project-cli/src/**', 'rust/project-cli/Cargo.toml') }}

      - name: Build syntek CLI
        if: steps.syntek-cli-cache.outputs.cache-hit != 'true'
        run: cargo build --release
        working-directory: rust/project-cli

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      # Run unified linting (Python only)
      - name: Lint Python with syntek CLI
        run: |
          # Lint Python only
          uv run ruff check .
        continue-on-error: true

      - name: Check formatting
        run: syntek format --check
        continue-on-error: true

      - name: Type check with mypy
        run: uv run mypy backend/ graphql/
        continue-on-error: true
