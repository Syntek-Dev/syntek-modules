name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-all:
    runs-on: ubuntu-latest
    name: Test All Projects

    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
          POSTGRES_DB: syntek_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up all environments
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"

      # Install dependencies
      - name: Install Python dependencies
        run: uv sync --extra dev --extra test

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      # Build syntek CLI
      - name: Cache syntek CLI
        uses: actions/cache@v4
        id: syntek-cli-cache
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ runner.os }}-syntek-cli-${{ hashFiles('rust/project-cli/src/**', 'rust/project-cli/Cargo.toml') }}

      - name: Build syntek CLI
        if: steps.syntek-cli-cache.outputs.cache-hit != 'true'
        run: cargo build --release
        working-directory: rust/project-cli

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      # Copy test environment
      - name: Set up test environment
        run: |
          if [ -f .env.test.example ]; then
            cp .env.test.example .env.test
          fi

      # Run unified tests using syntek CLI
      - name: Run all tests with syntek CLI
        run: syntek test --env .env.test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/syntek_test # pragma: allowlist secret
          REDIS_URL: redis://localhost:6379/0

      # Generate coverage reports (individual ecosystems)
      - name: Generate Python coverage
        run: uv run pytest backend/ graphql/ --cov --cov-report=xml --cov-report=html --cov-report=json
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/syntek_test # pragma: allowlist secret
          REDIS_URL: redis://localhost:6379/0
        continue-on-error: true

      - name: Check Python coverage threshold
        run: |
          COVERAGE=$(python3 -c "import json; data=json.load(open('coverage.json')); print(f\"{data['totals']['percent_covered']:.2f}\")")
          echo "📊 Current Python coverage: ${COVERAGE}%"

          # If baseline exists, compare
          if [ -f "coverage-baseline.json" ]; then
            BASELINE=$(python3 -c "import json; data=json.load(open('coverage-baseline.json')); print(f\"{data['totals']['percent_covered']:.2f}\")")
            echo "📈 Baseline coverage: ${BASELINE}%"

            # Check if coverage dropped by more than 1%
            DIFF=$(python3 -c "print(${COVERAGE} - ${BASELINE})")
            if (( $(echo "$DIFF < -1.0" | bc -l) )); then
              echo "❌ Coverage dropped by more than 1%!"
              echo "::error::Coverage dropped from ${BASELINE}% to ${COVERAGE}%"
              exit 1
            elif (( $(echo "$DIFF > 0" | bc -l) )); then
              echo "✅ Coverage improved by ${DIFF}%!"
            else
              echo "✅ Coverage maintained"
            fi
          else
            echo "ℹ️  No baseline found, skipping comparison"
          fi
        continue-on-error: false

      - name: Generate TypeScript coverage
        run: |
          pnpm --filter './web/packages/*' test -- --coverage
          pnpm --filter './mobile/packages/*' test -- --coverage
          pnpm --filter '@syntek/shared' test -- --coverage
        continue-on-error: true

      - name: Generate Rust coverage
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --workspace --all-features --out Xml --output-dir .
        working-directory: rust
        continue-on-error: true

      # Upload coverage reports
      - name: Upload Python coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: python
        continue-on-error: true

      - name: Upload TypeScript coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: typescript
        continue-on-error: true

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./rust/cobertura.xml
          flags: rust
        continue-on-error: true

      # Upload HTML coverage reports as artifacts
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage/
            rust/target/tarpaulin/
        if: always()
