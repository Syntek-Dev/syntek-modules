name: Rust

on:
  push:
    branches: [main, "us*/**"]
    paths:
      - "rust/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Fmt, clippy, test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --all --release

      - name: Security audit (cargo audit)
        run: |
          cargo install cargo-audit@0.21.2
          # Fetch the advisory DB and strip CVSS 4.0 entries that cargo-audit's
          # cvss v2.x parser cannot handle yet (no released version supports CVSS 4.0).
          git clone --depth=1 https://github.com/RustSec/advisory-db.git /tmp/advisory-db
          find /tmp/advisory-db -name "*.md" -print0 \
            | xargs -0 grep -l 'CVSS:4\.' \
            | xargs --no-run-if-empty rm -f
          # --no-fetch prevents cargo-audit from re-fetching the DB from the
          # remote, which would overwrite our patched local copy.
          cargo audit --db /tmp/advisory-db --no-fetch --deny warnings

      - name: Coverage (cargo llvm-cov)
        run: |
          cargo install cargo-llvm-cov@0.6.16
          # Scope to library crates only.
          # syntek-dev is a CLI binary that wraps shell commands — 0% coverage is by design.
          # syntek-pyo3 requires a Python interpreter (maturin) to test meaningfully.
          cargo llvm-cov \
            --package syntek-crypto \
            --package syntek-graphql-crypto \
            --fail-under-lines 80 \
            --lcov --output-path lcov.info

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: lcov.info
          retention-days: 30

      - name: Coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: lcov.info
          title: Rust coverage report
