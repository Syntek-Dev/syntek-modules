name: Lint Rust

on:
  push:
    branches: [main, develop]
    paths:
      - "rust/**/*.rs"
      - "rust/**/Cargo.toml"
      - ".github/workflows/lint-rust.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "rust/**/*.rs"
      - "rust/**/Cargo.toml"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Rust Linting & Formatting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # Build syntek CLI
      - name: Cache syntek CLI
        uses: actions/cache@v4
        id: syntek-cli-cache
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ runner.os }}-syntek-cli-${{ hashFiles('rust/project-cli/src/**', 'rust/project-cli/Cargo.toml') }}

      - name: Build syntek CLI
        if: steps.syntek-cli-cache.outputs.cache-hit != 'true'
        run: cargo build --release
        working-directory: rust/project-cli

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      # Run unified linting (Rust only)
      - name: Lint Rust with syntek CLI
        run: |
          # Lint Rust only
          cargo clippy --workspace --all-targets --all-features -- -D warnings
        working-directory: rust
        continue-on-error: true

      - name: Check formatting
        run: syntek format --check
        continue-on-error: true
