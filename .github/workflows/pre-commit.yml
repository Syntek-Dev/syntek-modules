name: Pre-commit Checks

on:
  pull_request:
    branches: [main, dev, staging, testing]
  push:
    branches: [main, dev, staging, testing]

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system pre-commit detect-secrets

      - name: Install Node dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Run manual stage hooks
        run: |
          pre-commit run --all-files --hook-stage manual --show-diff-on-failure
        continue-on-error: true # Don't fail build on manual checks

      - name: Upload pre-commit results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pre-commit-results
          path: |
            .pre-commit.log
            **/*.log
          retention-days: 7
