name: Python (Django)

on:
  push:
    branches: [main, "us*/**"]
    paths:
      - "packages/backend/**"
      - "pyproject.toml"
      - "pyrightconfig.json"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required for the three-dot diff in the
          # changed-package detection step below (git diff "$BASE"...HEAD).
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check packages/backend/

      - name: Format check (ruff)
        run: uv run ruff format --check packages/backend/

      - name: Type-check (basedpyright)
        run: uv run basedpyright packages/backend/

      - name: Security audit (pip-audit)
        run: uvx pip-audit

      - name: Detect changed packages
        id: changed
        run: |
          if git rev-parse origin/main >/dev/null 2>&1; then
            BASE=origin/main
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "HEAD")
          fi
          CHANGED_PACKAGES=""
          for pkg in packages/backend/*/; do
            pkg_name=$(basename "$pkg")
            if git diff --name-only "$BASE"...HEAD -- "$pkg" | grep -q .; then
              CHANGED_PACKAGES="$CHANGED_PACKAGES $pkg_name"
            fi
          done
          CHANGED_PACKAGES="${CHANGED_PACKAGES# }"
          echo "packages=$CHANGED_PACKAGES" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED_PACKAGES" ]; then
            echo "No affected backend packages detected — running full suite as fallback"
            echo "run_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "Affected packages: $CHANGED_PACKAGES"
            echo "run_all=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test (pytest — affected packages)
        run: |
          RUN_ALL="${{ steps.changed.outputs.run_all }}"
          CHANGED_PACKAGES="${{ steps.changed.outputs.packages }}"

          run_pytest() {
            local path="$1"
            EXIT_CODE=0
            uv run pytest "$path" -x -q \
              --cov="$path" \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              || EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 5 ]; then
              echo "No tests collected in $path — OK until tests are added"
              return 0
            fi
            return "$EXIT_CODE"
          }

          if [ "$RUN_ALL" = "true" ]; then
            run_pytest packages/backend/
          else
            for PACKAGE in $CHANGED_PACKAGES; do
              run_pytest "packages/backend/${PACKAGE}"
            done
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 30

      - name: Coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@v1.1.54
        with:
          pytest-xml-coverage-path: coverage.xml
          title: Python coverage report
