name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: "0 2 * * *"

jobs:
  unified-security-audit:
    runs-on: ubuntu-latest
    name: Security Audit (All Ecosystems)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up all required environments
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13"
          cache: "pnpm"

      # Install dependencies
      - name: Install Python dependencies
        run: uv sync

      - name: Install Node dependencies
        run: pnpm install --no-frozen-lockfile

      # Build syntek CLI
      - name: Cache syntek CLI
        uses: actions/cache@v4
        id: syntek-cli-cache
        with:
          path: rust/project-cli/target/release/syntek
          key: ${{ runner.os }}-syntek-cli-${{ hashFiles('rust/project-cli/src/**', 'rust/project-cli/Cargo.toml') }}

      - name: Build syntek CLI
        if: steps.syntek-cli-cache.outputs.cache-hit != 'true'
        run: cargo build --release
        working-directory: rust/project-cli

      - name: Install syntek CLI
        run: cargo install --path rust/project-cli

      # Run unified security audit
      - name: Run unified security audit (Text)
        run: syntek audit --format text --severity moderate
        continue-on-error: true

      - name: Generate JSON audit report
        run: syntek audit --format json --severity moderate --output security-audit-report.json
        continue-on-error: true

      - name: Generate Markdown audit report
        run: syntek audit --format markdown --severity moderate --output SECURITY-AUDIT-REPORT.md
        continue-on-error: true

      - name: Upload JSON audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report-json
          path: security-audit-report.json
        if: always()

      - name: Upload Markdown audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report-markdown
          path: SECURITY-AUDIT-REPORT.md
        if: always()

  ruff-security-linting:
    runs-on: ubuntu-latest
    name: Python Security Linting (Ruff)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Run ruff security checks
        run: uv run ruff check --select S,A,DTZ backend/ graphql/
        continue-on-error: true

  cargo-deny:
    runs-on: ubuntu-latest
    name: Rust Supply Chain Security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo deny
        run: cargo deny check
        working-directory: rust
        continue-on-error: true

  dependency-review:
    runs-on: ubuntu-latest
    name: Dependency Review (PRs only)
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  codeql:
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      matrix:
        language: ["python", "javascript"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning (Gitleaks)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-summary:
    runs-on: ubuntu-latest
    name: Security Summary
    needs:
      - unified-security-audit
      - ruff-security-linting
      - cargo-deny
      - codeql
      - secret-scan
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download audit reports
        uses: actions/download-artifact@v4
        with:
          name: security-audit-report-markdown
        continue-on-error: true

      - name: Post summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Unified Audit: ${{ needs.unified-security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ruff Security: ${{ needs.ruff-security-linting.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cargo Deny: ${{ needs.cargo-deny.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scan: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f SECURITY-AUDIT-REPORT.md ]; then
            echo "## Detailed Audit Report" >> $GITHUB_STEP_SUMMARY
            cat SECURITY-AUDIT-REPORT.md >> $GITHUB_STEP_SUMMARY
          fi
