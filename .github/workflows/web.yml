name: Web (TypeScript)

on:
  push:
    branches: [main, "us*/**"]
    paths:
      - "shared/**"
      - "packages/web/**"
      - "mobile/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - ".prettierrc"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"

      - name: Generate lockfile
        run: pnpm install --lockfile-only

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Prettier
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: Markdown lint
        run: pnpm lint:md

      - name: Type-check
        run: pnpm type-check

      - name: Security audit (pnpm audit)
        run: pnpm audit --audit-level=high

      - name: Test (affected packages)
        run: pnpm turbo run test --affected -- --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: "**/coverage/coverage-summary.json"
          retention-days: 30

      - name: Coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Web coverage report
          json-summary-compare-path: coverage/coverage-summary.json
          json-summary-path: coverage/coverage-summary.json
