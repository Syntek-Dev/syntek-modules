name: Web (TypeScript)

on:
  push:
    branches: [main, "us*/**"]
    paths:
      - "shared/**"
      - "packages/web/**"
      - "mobile/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "tsconfig*.json"
      - "eslint.config.mjs"
      - ".prettierrc"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Generate lockfile
        run: pnpm install --lockfile-only

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Prettier
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: Markdown lint
        run: pnpm lint:md

      - name: Type-check
        run: pnpm type-check

      - name: Security audit (pnpm audit)
        run: pnpm audit --audit-level=high

      - name: Test (affected packages)
        run: pnpm turbo run test --affected -- --coverage --coverage.reporter=json-summary --coverage.reporter=json --coverage.reporter=text

      - name: Merge coverage reports
        if: always()
        run: |
          SUMMARY_FILES=$(find . -path "*/coverage/coverage-summary.json" -not -path "*/node_modules/*" 2>/dev/null | tr '\n' ' ')
          FINAL_FILES=$(find . -path "*/coverage/coverage-final.json" -not -path "*/node_modules/*" 2>/dev/null | tr '\n' ' ')
          if [ -z "$SUMMARY_FILES" ]; then
            echo "COVERAGE_EXISTS=false" >> "$GITHUB_ENV"
          else
            echo "COVERAGE_EXISTS=true" >> "$GITHUB_ENV"
            mkdir -p coverage
            # shellcheck disable=SC2086
            jq -s 'reduce .[] as $item ({}; . * $item)' $SUMMARY_FILES > coverage/coverage-summary.json
            if [ -n "$FINAL_FILES" ]; then
              # shellcheck disable=SC2086
              jq -s 'reduce .[] as $item ({}; . * $item)' $FINAL_FILES > coverage/coverage-final.json
            fi
          fi

      - name: Upload coverage artifact
        if: always() && env.COVERAGE_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/
          retention-days: 30

      - name: Coverage report (PR comment)
        if: github.event_name == 'pull_request' && env.COVERAGE_EXISTS == 'true'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Web coverage report
          json-summary-compare-path: coverage/coverage-summary.json
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
