mutation Login($email: String!, $password: String!) {
  login(email: $email, password: $password) {
    token
    user {
      id
      email
      createdAt
      roles {
        id
        name
        permissions {
          name
          scope
        }
      }
    }
  }
}

mutation Logout {
  logout {
    success
  }
}

mutation RefreshToken {
  refreshToken {
    token
  }
}

query CurrentUser {
  me {
    id
    email
    createdAt
    roles {
      id
      name
      permissions {
        name
        scope
      }
    }
  }
}
