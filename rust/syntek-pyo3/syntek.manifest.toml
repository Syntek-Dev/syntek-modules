# syntek.manifest.toml — syntek-pyo3
#
# Crate ID and Forgejo registry coordinates.
# No user-configurable options — the Rust encryption layer is fixed by Syntek security
# policy. The `syntek add` CLI reads this file, pins the version in the consumer's
# Cargo.toml, and prints the post-install steps below.

id      = "syntek-pyo3"
version = "0.13.0"
kind    = "rust-crate"

# ---------------------------------------------------------------------------
# Post-install steps
#
# Shown to the developer after `syntek add syntek-pyo3` completes.
# The native extension must be compiled with maturin and the resulting wheel
# installed into the consumer's Python environment (venv for local dev;
# Docker layer for production).
# ---------------------------------------------------------------------------

[[post_install_steps]]
label   = "Build the native extension wheel"
snippet = "maturin build --release -p syntek-pyo3"
lang    = "bash"

[[post_install_steps]]
label   = "Install the wheel into your environment (uv preferred; pip fallback)"
snippet = "uv pip install target/wheels/syntek_pyo3-*.whl 2>/dev/null || pip install target/wheels/syntek_pyo3-*.whl"
lang    = "bash"

[[post_install_steps]]
label   = "Verify the import"
snippet = "from syntek_pyo3 import encrypt_field, decrypt_field, encrypt_fields_batch, decrypt_fields_batch, hash_password, verify_password"
lang    = "python"

[[post_install_steps]]
label   = "Set per-field encryption keys in your environment (one per encrypted column)"
snippet = "SYNTEK_FIELD_KEY_<MODEL>_<FIELD>=<32-byte-hex-key>  # e.g. SYNTEK_FIELD_KEY_USER_EMAIL"
lang    = "bash"
