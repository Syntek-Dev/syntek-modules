# Pre-commit hooks for multi-language Syntek Modules repository
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # ============================================================================
  # General file checks (all languages)
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # File formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]

      # File validation
      - id: check-yaml
        args: [--unsafe] # Allow custom tags in YAML
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]

      # Security checks
      - id: detect-private-key
      - id: check-symlinks
      - id: destroyed-symlinks

  # ============================================================================
  # Python / Django
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      # Linter (replaces flake8, isort, etc.)
      - id: ruff
        name: ruff (Python linter)
        args: [--fix]
        files: ^backend/.*\.py$
        exclude: ^\.claude/plugins/.*\.py$

      # Formatter (replaces black)
      - id: ruff-format
        name: ruff-format (Python formatter)
        files: ^backend/.*\.py$
        exclude: ^\.claude/plugins/.*\.py$

  # Python type checking with pyright (via syntek CLI)
  - repo: local
    hooks:
      - id: typecheck
        name: syntek typecheck (type checker)
        entry: syntek typecheck
        language: system
        files: ^(backend|graphql)/.*\.py$
        exclude: ^(backend/.*/migrations/.*\.py|\.claude/plugins/.*\.py)$
        pass_filenames: false

  # ============================================================================
  # JavaScript / TypeScript (Next.js, React Native)
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.20.0
    hooks:
      - id: eslint
        name: eslint (JS/TS linter)
        files: \.(js|jsx|ts|tsx)$
        types: [file]
        args: [--fix, --max-warnings=0]
        additional_dependencies:
          - eslint@9.20.0
          - "@eslint/js@9.20.0"
          - "@typescript-eslint/parser@8.28.0"
          - "@typescript-eslint/eslint-plugin@8.28.0"
          - eslint-plugin-react@7.37.3
          - eslint-plugin-react-hooks@5.1.0

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: prettier (JS/TS formatter)
        files: \.(js|jsx|ts|tsx|json|css|scss|md|yaml|yml)$
        args: [--write]

  # TypeScript type checking (runs tsc)
  - repo: local
    hooks:
      - id: typescript-check
        name: tsc (TypeScript type checker)
        entry: bash -c 'cd web && pnpm typecheck || true && cd ../mobile && pnpm typecheck || true'
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false

  # ============================================================================
  # Rust
  # ============================================================================
  - repo: local
    hooks:
      - id: rust-fmt
        name: cargo fmt (Rust formatter)
        entry: bash -c 'cd rust && cargo fmt --all -- --check'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: rust-clippy
        name: cargo clippy (Rust linter)
        entry: bash -c 'cd rust && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: rust-test
        name: cargo test (Rust tests)
        entry: bash -c 'cd rust && cargo test --all'
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [manual] # Only run when explicitly requested

  # ============================================================================
  # Django-specific
  # ============================================================================
  - repo: local
    hooks:
      - id: django-check
        name: django check (Django system check)
        entry: bash -c 'cd backend && python manage.py check --deploy || echo "⚠️  Django check requires settings"'
        language: system
        files: ^backend/.*\.(py|html)$
        pass_filenames: false
        stages: [manual] # Only run when explicitly requested

      - id: django-migrations-check
        name: django makemigrations --check
        entry: bash -c 'cd backend && python manage.py makemigrations --check --dry-run || echo "⚠️  Migrations need to be created"'
        language: system
        files: ^backend/.*/models\.py$
        pass_filenames: false
        stages: [manual] # Only run when explicitly requested

  # ============================================================================
  # Security scanning
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (secrets scanner)
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            .*\.lock$|
            package-lock\.json$|
            pnpm-lock\.yaml$|
            Cargo\.lock$|
            uv\.lock$
          )$

  # Python dependencies security audit
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (Python CVE scanner)
        entry: bash -c 'uv pip list --format json | pip-audit --stdin || echo "⚠️  pip-audit not installed"'
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        stages: [manual]

  # ============================================================================
  # Markdown / Documentation
  # ============================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        name: markdownlint (Markdown linter)
        args: [--fix]
        files: \.md$

  # ============================================================================
  # Commit message validation
  # ============================================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        name: conventional-commits (commit msg format)
        stages: [commit-msg]
        args: [--force-scope] # Require scope in commit messages

# ============================================================================
# Configuration
# ============================================================================
default_language_version:
  python: python3.14
  node: 24.13.0

# Fail fast on first error
fail_fast: false

# Minimum pre-commit version
minimum_pre_commit_version: "3.0.0"
