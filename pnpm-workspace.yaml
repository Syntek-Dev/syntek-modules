# pnpm workspace configuration for syntek-modules
# This file defines all packages in the monorepo

packages:
  # Web packages (Next.js/React modules)
  - 'web/packages/*'

  # Mobile packages (React Native modules)
  - 'mobile/packages/*'

  # Shared cross-platform UI library
  - 'shared'

  # Example applications
  - 'examples/nextjs-app'
  - 'examples/expo-app'
  - 'examples/django-app/frontend'
