[project]
name = "syntek-pyo3"
version = "0.12.1"
description = "Django EncryptedField and PyO3 bindings for the Syntek encryption layer"
requires-python = ">=3.14"
dependencies = [
    "django>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
