[project]
name = "syntek-graphql-crypto"
version = "0.2.0"
description = "GraphQL middleware preventing plaintext resolver output for the Syntek encryption layer"
requires-python = ">=3.14"
dependencies = [
    "django>=6.0",
    "strawberry-graphql>=0.307.1",
    "syntek-pyo3>=0.17.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.9",
    "testcontainers[postgres]>=4.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

