[project]
name = "syntek-security"
version = "0.1.0"
description = "Security middleware for Syntek — rate limiting, CORS, CSP, HSTS, proxy trust"
requires-python = ">=3.14"
dependencies = [
    "django>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.9",
    "factory-boy>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/syntek_security"]
