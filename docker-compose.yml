# Optional Docker Compose for Module Development and Testing
# This is NOT for production deployment - modules are meant to be installed in other projects

version: '3.8'

services:
  # PostgreSQL for backend module testing
  postgres:
    image: postgres:18.1
    container_name: syntek-modules-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syntek_modules_dev}
      POSTGRES_USER: ${POSTGRES_USER:-syntek_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syntek_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional, for caching/sessions in module tests)
  redis:
    image: redis:7-alpine
    container_name: syntek-modules-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend module test runner
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: syntek-modules-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app/backend
      - ./rust:/app/rust
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-syntek_dev}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-syntek_modules_dev}

  # Web module test runner
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: syntek-modules-web
    command: npm run dev
    volumes:
      - ./web:/app/web
      - ./shared:/app/shared
      - /app/web/node_modules
      - /app/shared/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env.dev
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/graphql

  # Mobile module test runner (Expo)
  mobile:
    build:
      context: .
      dockerfile: docker/Dockerfile.mobile
    container_name: syntek-modules-mobile
    command: npm start
    volumes:
      - ./mobile:/app/mobile
      - ./shared:/app/shared
      - /app/mobile/node_modules
      - /app/shared/node_modules
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    env_file:
      - .env.dev
    environment:
      EXPO_PUBLIC_API_URL: http://backend:8000/graphql

  # Example Django app (shows how to use modules)
  example-django:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-django
    container_name: syntek-modules-example-django
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./examples/django-app:/app
      - ./backend:/modules/backend
    ports:
      - "8001:8001"
    env_file:
      - .env.dev
    depends_on:
      - postgres
      - backend

  # Example Next.js app (shows how to use modules)
  example-nextjs:
    build:
      context: .
      dockerfile: docker/Dockerfile.example-nextjs
    container_name: syntek-modules-example-nextjs
    command: npm run dev
    volumes:
      - ./examples/nextjs-app:/app
      - ./web:/modules/web
      - ./shared:/modules/shared
    ports:
      - "3001:3001"
    env_file:
      - .env.dev
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: syntek-modules-network
